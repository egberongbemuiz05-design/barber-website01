<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

      <section class="service-page">

        <h1>Book Appointment</h1>
        <p>Schedule your Visit and get the best grooming experience</p>
        <img src="images/barbe9.jpg" alt="Barber Image" width="20%">

    <!-- BOOKING FORM -->
     <h2>Fill the Form Below</h2>
     <form action="https://formspree.io/f/xzdyvpqq" method="POST" onsubmit="return handleSubmit(event)">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="tel" name="phone" placeholder="Phone Number" required>

        <input type="date" name="date" required>
        <input type="time" name="time" required>

        <select name="service" required>
            <option value="">Select Service</option>
            <option>Haircut</option>
            <option>Beard</option>
            <option>Styling</option>
        </select>

        <button type="submit">Confirm Booking</button>
     </form>

     <br>

     <!-- EXTRA INFO -->
      <p>we will contact you to confirm your appointment</p>

      <!-- WHATSAPP -->
      <a href="https://wa.me/2348143638666" class="whatsapp" target="_blank">      
        Chat on WhatsApp
      </a>
    <br><br>

           <!-- BACK BUTTON -->
       <a href="index.html" class="btn">Back to Home</a>
    </section>

    <script>
        function handleSubmit(event)  {
            // event.preventDefault();

            let selectDate = document.querySelector("input[name='date']").value;

            let today = new Date().toISOString().split("T")[0];

            if (selectedDate === today) {
                alert("Today is fully booked. Please select another date (2-3 days ahead).");
                return false;
            }

            alert("Thanks for booking with us! we will contact you shortly");
            return true;
            // event.target.submit();
        }
     </script>      

     
</body>
</html>
