<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/jpeg" href="images/barbe1.jpg">
</head>
<body>

<section class="service-page">

    <h1>Book Appointment</h1>
    <p>Schedule your visit and get the best grooming experience</p>

    <!-- IMAGE -->
    <img src="images/barbe9.jpg" alt="Barber Image" style="width:100%; max-width:300px;">

    <!-- DATE SELECTION -->
    <h2>Select Appointment Date</h2>
    <p>Select a date to continue booking</p>

    <input type="date" id="datePicker" required>

    <br><br>

    <!-- BOOKING FORM -->
    <form id="bookingForm">

        <!-- SUCCESS REDIRECT -->
        <input type="hidden" name="date" id="selectedDate">

        <!-- HIDDEN DATE -->
        <!-- <input type="hidden" name="date" id="selectedDate"> -->

        <input type="text" name="name" placeholder="Full Name" required>
        <input type="tel" name="phone" placeholder="Phone Number" required>

        <!-- <input type="time" name="time" required> -->

        <select name="service" required>
            <option value="">Select Service</option>
            <option>Haircut</option>
            <option>Beard</option>
            <option>Styling</option>
        </select>

        <button type="submit" id="submitBtn">Confirm Booking</button>
    </form>

    <!-- SUCCESS MESSAGE -->
    <div class="success-message" id="successMsg">
        <h2>✅ Appointment Confirmed</h2>
        <p id="confirmText"></p>
    </div>

    <br>

    <p>We will contact you to confirm your appointment</p>

    <!-- WHATSAPP -->
    <a href="https://wa.me/2348143638666" class="whatsapp" target="_blank">
        Chat on WhatsApp
    </a>

    <br><br>

    <!-- BACK BUTTON -->
    <a href="index.html" class="btn">Back to Home</a>

</section>

<!-- SCRIPT -->
<script>

// SHOW FORM AFTER DATE SELECTION
document.getElementById("datePicker").addEventListener("change", function () {

    let selectedDate = this.value;
    let today = new Date().toISOString().split("T")[0];

    if (selectedDate === today) {
        alert("Today is fully booked. Please choose another date.");
        this.value = "";
        return;
    }

    document.getElementById("bookingForm").style.display = "block";
    document.getElementById("selectedDate").value = selectedDate;
});


// HANDLE SUBMIT WITH REDIRECT
document.getElementById("bookingForm").addEventListener("submit", function (e) {
    e.preventDefault();  //STOP default behavior

    let form = e.target;

    // let date = document.getElementById("selectedDate").value;

    fetch("https://formspree.io/f/xzdyvpqq", {
        method:  "POST",
        body:  new FormData(form),
        headers:  {
            'Accept':  'application/json'
        } 
    }).then(response  =>  {
        if (response  .ok) {
            //✅ REDIRECT MANUALLY
            window.location.href ="success.html";
        } else {
            alert("something went wrong. Try again.");
        }
    })

    // Change button text
    document.getElementById("submitBtn").innerText = "Processing...";

    alert("Your appointment is booked for: " + date);

});

</script>

</body>
</html>
